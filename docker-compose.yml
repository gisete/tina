version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: health_dash_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
